services:
  minio:
    image: minio/minio:latest
    container_name: opencloning-minio-dev
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: opencloning-dev
      MINIO_ROOT_PASSWORD: opencloning-dev-secret
    volumes:
      - opencloning_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio-bootstrap:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    restart: "no"
    entrypoint:
      - /bin/sh
      - -c
    command: >-
      mc alias set local http://minio:9000 opencloning-dev opencloning-dev-secret
      && mc mb --ignore-existing local/opencloning-dev

volumes:
  opencloning_minio_data:
