name: Release Please

on:
  push:
    branches:
      - master

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release_please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      opencloning_release_created: ${{ steps.release.outputs['packages/opencloning--release_created'] }}
      opencloning_version: ${{ steps.release.outputs['packages/opencloning--version'] }}
      opencloning_db_release_created: ${{ steps.release.outputs['packages/opencloning-db--release_created'] }}
      opencloning_db_version: ${{ steps.release.outputs['packages/opencloning-db--version'] }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}

      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Install uv
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        uses: astral-sh/setup-uv@v5
        with:
          version: 0.11.5
          enable-cache: true

      - name: Set up Python
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync uv.lock on release PR
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        env:
          RELEASE_BRANCH: ${{ fromJson(steps.release.outputs.pr).headBranchName }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout "$RELEASE_BRANCH"
          uv lock
          if git diff --quiet uv.lock; then
            echo "uv.lock already up to date"
            exit 0
          fi
          git add uv.lock
          git commit -m "chore: sync uv.lock for release"
          git push

  publish_pypi:
    runs-on: ubuntu-latest
    needs: release_please
    if: ${{ needs.release_please.outputs.opencloning_release_created == 'true' || needs.release_please.outputs.opencloning_db_release_created == 'true' }}
    environment:
      name: publish
      url: https://pypi.org/p/opencloning
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build opencloning distribution
        if: ${{ needs.release_please.outputs.opencloning_release_created == 'true' }}
        run: uv build --package opencloning --out-dir dist/opencloning

      - name: Publish opencloning to PyPI
        if: ${{ needs.release_please.outputs.opencloning_release_created == 'true' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/opencloning/

      - name: Build opencloning-db distribution
        if: ${{ needs.release_please.outputs.opencloning_db_release_created == 'true' }}
        run: uv build --package opencloning-db --out-dir dist/opencloning-db

      - name: Publish opencloning-db to PyPI
        if: ${{ needs.release_please.outputs.opencloning_db_release_created == 'true' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/opencloning-db/

  publish_docker:
    runs-on: ubuntu-latest
    needs: release_please
    if: ${{ needs.release_please.outputs.opencloning_release_created == 'true' || needs.release_please.outputs.opencloning_db_release_created == 'true' }}
    environment:
      name: publish
      url: https://pypi.org/p/opencloning
    permissions:
      contents: read
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata for cloning Docker image
        if: ${{ needs.release_please.outputs.opencloning_release_created == 'true' }}
        id: docker-meta-cloning
        uses: docker/metadata-action@v6
        with:
          images: manulera/opencloningbackend

      - name: Build and push cloning Docker image
        if: ${{ needs.release_please.outputs.opencloning_release_created == 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/opencloning.Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            manulera/opencloningbackend:prod
            manulera/opencloningbackend:${{ needs.release_please.outputs.opencloning_version }}
          labels: ${{ steps.docker-meta-cloning.outputs.labels }}
          build-args: APP_TARGET=cloning

      - name: Run Trivy vulnerability scanner (cloning)
        if: ${{ needs.release_please.outputs.opencloning_release_created == 'true' }}
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: manulera/opencloningbackend:prod
          format: "table"
          exit-code: "0"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"

      - name: Extract metadata for db Docker image
        if: ${{ needs.release_please.outputs.opencloning_db_release_created == 'true' }}
        id: docker-meta-db
        uses: docker/metadata-action@v6
        with:
          images: manulera/opencloning-db-backend

      - name: Build and push db Docker image
        if: ${{ needs.release_please.outputs.opencloning_db_release_created == 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/opencloning.Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            manulera/opencloning-db-backend:prod
            manulera/opencloning-db-backend:${{ needs.release_please.outputs.opencloning_db_version }}
          labels: ${{ steps.docker-meta-db.outputs.labels }}
          build-args: APP_TARGET=db

      - name: Run Trivy vulnerability scanner (db)
        if: ${{ needs.release_please.outputs.opencloning_db_release_created == 'true' }}
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: manulera/opencloning-db-backend:prod
          format: "table"
          exit-code: "0"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"
