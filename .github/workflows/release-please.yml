name: Release Please

on:
  push:
    branches:
      - master

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release_please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      opencloning_release_created: ${{ steps.release.outputs['packages/opencloning--release_created'] }}
      opencloning_version: ${{ steps.release.outputs['packages/opencloning--version'] }}
      opencloning_db_release_created: ${{ steps.release.outputs['packages/opencloning-db--release_created'] }}
      opencloning_db_version: ${{ steps.release.outputs['packages/opencloning-db--version'] }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish_pypi:
    runs-on: ubuntu-latest
    needs: release_please
    if: ${{ needs.release_please.outputs.opencloning_release_created == 'true' || needs.release_please.outputs.opencloning_db_release_created == 'true' }}
    environment:
      name: publish
      url: https://pypi.org/p/opencloning
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build opencloning distribution
        if: ${{ needs.release_please.outputs.opencloning_release_created == 'true' }}
        run: uv build --package opencloning --out-dir dist/opencloning

      - name: Publish opencloning to PyPI
        if: ${{ needs.release_please.outputs.opencloning_release_created == 'true' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/opencloning/

      - name: Build opencloning-db distribution
        if: ${{ needs.release_please.outputs.opencloning_db_release_created == 'true' }}
        run: uv build --package opencloning-db --out-dir dist/opencloning-db

      - name: Publish opencloning-db to PyPI
        if: ${{ needs.release_please.outputs.opencloning_db_release_created == 'true' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/opencloning-db/

  publish_docker:
    runs-on: ubuntu-latest
    needs: release_please
    if: ${{ needs.release_please.outputs.opencloning_release_created == 'true' }}
    environment:
      name: publish
      url: https://pypi.org/p/opencloning
    permissions:
      contents: read
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata for Docker
        id: docker-meta
        uses: docker/metadata-action@v6
        with:
          images: manulera/opencloningbackend

      - name: Build and push release Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/opencloning.Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            manulera/opencloningbackend:prod
            manulera/opencloningbackend:${{ needs.release_please.outputs.opencloning_version }}
          labels: ${{ steps.docker-meta.outputs.labels }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: manulera/opencloningbackend:prod
          format: "table"
          exit-code: "0"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"
